<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>GCchecker</title>

<style>
*{box-sizing:border-box;}

body{
    margin:0;
    padding:6px;
    background:#111;
    color:#fff;
    font-family:sans-serif;
}

:root{
    --base-font: clamp(16px, 2.1vh, 24px);
}

.gcRow{
    display:flex;
    align-items:center;
    gap:10px;
    margin:6px 0;
}

.label{
    flex:0 0 clamp(84px, 14vw, 120px);
    width:clamp(84px, 14vw, 120px);
    font-size:var(--base-font);
    font-weight:bold;
    white-space:nowrap;
}

.gcBtns{
    display:flex;
    gap:6px;
}

.gcBtns .btn{
    font-size:var(--base-font);
    line-height:1;
    height:3.0em;
    padding:0 9px;
    border:none;
    border-radius:6px;
    display:flex;
    align-items:center;
    justify-content:center;
    white-space:nowrap;
    flex:0 0 auto;
    width:10.0em;
    text-align:center;
    background:#444;
    color:#fff;
}

.btn.active{
    background:#1e8e3e;
}

.btn{
    border:none;
    border-radius:8px;
    font-size:var(--base-font);
    font-weight:bold;
    background:#333;
    color:#fff;
}

.result{
    margin-top:6px;
    background:#000;
    border:1px solid #666;
    border-radius:8px;
    padding:10px;
    line-height:1.45;
    font-size:clamp(19px,2.85vh,42px);
    font-weight:bold;
}

.stop{ color:#ffd600; font-weight:900; }
.move{ color:#4fc3ff; font-weight:900; }

.btnRow{
    display:flex;
    gap:6px;
    margin-top:6px;
}

.reset,
#viewBtn{
    flex:1;
    height:clamp(46px,6.2vh,76px);
    border:none;
    border-radius:8px;
    font-weight:bold;
}

.reset{
    background:#b00020;
    color:#fff;
    font-size:var(--base-font);
}

#viewBtn{
    background:#444;
    color:#fff;
    font-size:var(--base-font);
}

.headshare{ color:#4fc3ff; font-weight:900; }
.spread{ color:#ffd600; font-weight:900; }

.statusIcon{
    height:1.35em;
    width:auto;
    margin-left:0.35em;
    vertical-align:middle;
    border-radius:50%;
}
</style>
</head>

<body>

<!-- GC1 -->
<div class="gcRow">
    <div class="label">GC1</div>
    <div class="gcBtns">
        <button class="btn" data-id="f1"></button>
        <button class="btn" data-id="t1"></button>
    </div>
</div>

<!-- GC2 -->
<div class="gcRow">
    <div class="label">GC2</div>
    <div class="gcBtns">
        <button class="btn" data-id="f2"></button>
    </div>
</div>

<!-- ほのお・つなみ -->
<div class="gcRow">
    <div class="label">炎・津波</div>
    <div class="gcBtns">
        <button class="btn" data-id="c5" data-label="ほのお"></button>
        <button class="btn" data-id="c6" data-label="つなみ"></button>
    </div>
</div>

<!-- サンダガ -->
<div class="gcRow">
    <div class="label">サンダガ</div>
    <div class="gcBtns">
        <button class="btn" data-id="c8" data-label="チャージ"></button>
        <button class="btn" data-id="d8" data-label="アウト"></button>
    </div>
</div>

<!-- ブリザガ -->
<div class="gcRow">
    <div class="label">ブリザガ</div>
    <div class="gcBtns">
        <button class="btn" data-id="c9" data-label="チャージ"></button>
        <button class="btn" data-id="d9" data-label="アウト"></button>
    </div>
</div>

<div id="result" class="result"></div>

<div class="btnRow">
    <button class="reset" onclick="resetAll()">リセット</button>
    <button id="viewBtn" onclick="toggleView()">表示：頭割り/散開</button>
</div>

<script>

const s = {
    firstThunderEarly:true,
    f1:true,
    f2:true,
    c5:true,
    c6:true,
    c8:true,
    d8:true,
    c9:true,
    d9:true
};

let simpleView = true;

// 差分キャッシュ（プルプル対策）
const prev = {};

function renderUI(){

    document.querySelectorAll(".btn").forEach(btn=>{

        const id = btn.dataset.id;
        let val = (id==="t1") ? s.firstThunderEarly : s[id];

        if(prev[id] === val) return;
        prev[id] = val;

        btn.classList.toggle("active", !!val);

        if(id==="t1"){
            btn.textContent = "水雷（" + (s.firstThunderEarly ? "早" : "遅") + "）";
        }
        else if(id==="f1"){
            btn.innerHTML = s.f1
                ? '真 <img src="真.png" class="statusIcon">'
                : '偽 <img src="偽.png" class="statusIcon">';
        }
        else if(id==="f2"){
            btn.innerHTML = s.f2
                ? '真 <img src="真.png" class="statusIcon">'
                : '偽 <img src="偽.png" class="statusIcon">';
        }
        else{
            btn.innerHTML = val
                ? `${btn.dataset.label || ""}（真 <img src="真.png" class="statusIcon">）`
                : `${btn.dataset.label || ""}（偽 <img src="偽.png" class="statusIcon">）`;
        }
    });
}

function make(j){
    if(simpleView){
        return j
            ? '水：<span class="headshare">頭割り</span>　雷：<span class="spread">散開</span>'
            : '水：<span class="spread">散開</span>　雷：<span class="headshare">頭割り</span>';
    }
    return j ? '水：AC　雷：BD' : '水：BD　雷：AC';
}

function calc(){

    const f1 = s.f1;
    const f2 = s.f2;

    let r1,r4;

    if(s.firstThunderEarly){
        r1 = make(f1);
        r4 = make(f2);
    }else{
        r1 = make(f2);
        r4 = make(f1);
    }

    const v1 = f1 ? "外向く" : "中向く";
    const v4 = f2 ? "外向く" : "中向く";

    const k5 = s.c5 ? "中央から外へ" : "中央待機";
    const k6 = s.c6 ? "中央待機" : "中央から外へ";

    const j8 = s.c8 ? "踏まない" : "直線踏む";
    const j9 = s.c9 ? "踏まない" : "扇踏む";

    let l1;
    if(j8==="踏まない" && j9==="踏まない") l1="踏まない";
    else if(j8!=="踏まない" && j9!=="踏まない") l1="踏む踏む";
    else l1=(j8==="踏まない") ? j9 : j8;

    const stop = '<span class="stop">止まる</span>';
    const move = '<span class="move">動く</span>';

    document.getElementById("result").innerHTML =
`① ${r1}
<br>　早視線：${f1 ? stop : move}　GC2無職：${f2 ? stop : move}
<br>② ${v1}
<br>③ ${k5}
<br>④ ${r4}
<br>　遅視線：${f2 ? stop : move}　GC1無職：${f1 ? stop : move}
<br>⑤ ${v4}
<br>⑥ ${k6}
<br>⑦ ${l1}`;
}

// =========================
// クリック操作
// =========================
document.querySelectorAll(".btn").forEach(btn=>{
    btn.addEventListener("pointerdown",(e)=>{
        e.preventDefault();

        const id = btn.dataset.id;
        if(id==="t1") s.firstThunderEarly = !s.firstThunderEarly;
        else s[id] = !s[id];

        renderUI();
        calc();
    });
});

// =========================
// テンキー（安定版）
// =========================
window.addEventListener("keydown", (e) => {

    if (["INPUT","TEXTAREA"].includes(document.activeElement.tagName)) return;
    if (e.repeat) return;

    switch (e.code) {

        case "Numpad7": s.f1 = !s.f1; break;
        case "Numpad4": s.firstThunderEarly = !s.firstThunderEarly; break;
        case "Numpad1": s.f2 = !s.f2; break;

        case "Numpad8": s.c5 = !s.c5; break;
        case "Numpad9": s.c6 = !s.c6; break;

        case "Numpad5": s.c8 = !s.c8; break;
        case "Numpad6": s.d8 = !s.d8; break;

        case "Numpad2": s.c9 = !s.c9; break;
        case "Numpad3": s.d9 = !s.d9; break;

        default: return;
    }

    e.preventDefault();
    renderUI();
    calc();
});

function toggleView(){
    simpleView = !simpleView;
    document.getElementById("viewBtn").textContent =
        simpleView ? "表示：頭割り/散開" : "表示：AC/BD";
    calc();
}

function resetAll(){
    Object.keys(s).forEach(k=>{
        if(typeof s[k]==="boolean") s[k]=true;
    });
    s.firstThunderEarly = true;
    renderUI();
    calc();
}

renderUI();
calc();

</script>

</body>
</html>
